name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run pytest
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: gameon_ci
          JWT_SECRET: ci-test-secret-do-not-use-in-prod
          ADMIN_EMAIL: admin@ci.local
          ADMIN_PASSWORD: ci-admin-password
          SUPER_TEST_LOGIN_ENABLED: 'true'
          PRO_MONTHLY_PRICE_EUR: '5.00'
        run: |
          cd backend
          PYTHONPATH=. pytest tests/ -v --tb=short

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install
        run: |
          cd frontend
          yarn install --frozen-lockfile

      - name: Lint
        run: |
          cd frontend
          npx eslint "app/**/*.{ts,tsx}" "src/**/*.{ts,tsx}" --max-warnings=0
